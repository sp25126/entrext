<!DOCTYPE html>
<html>
<head>
  <title>Entrext Hub</title>
  <style>
    body { 
      width: 320px; 
      padding: 20px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #0D0D12; 
      color: #FFFFFF; 
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #A855F7, #EC4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      font-size: 9px;
      font-weight: 900;
      padding: 4px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.05);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.active {
      background: rgba(168, 85, 247, 0.1);
      color: #A855F7;
      border-color: rgba(168, 85, 247, 0.2);
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input {
      background: #16161D;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 12px;
      color: white;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #A855F7;
    }
    button {
      background: #A855F7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
    }
    button:hover {
      background: #9333EA;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    .footer {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">ENTREXT_HUB</div>
      <div id="modeStatus" class="badge">Inactive</div>
    </div>

    <div class="input-group">
      <label>Project identity</label>
      <input type="text" id="projectId" placeholder="Paste ID from dashboard...">
    </div>

    <button id="activateBtn">Activate Feedback Suite</button>

    <div class="footer">
      Audit assets are pinned to the active project context.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
