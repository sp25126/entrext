<!DOCTYPE html>
<html>
<head>
  <title>Entrext Lens</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Entrext Lens <span class="accent">⚡</span></div>
      <div id="statusIndicator" class="pulse-dot"></div>
    </div>

    <div class="section">
      <label>Groq Intelligence (API Keys)</label>
      <div class="key-input">
        <input type="password" id="groqKey1" placeholder="Primary Key (Required)">
        <button class="eye-toggle" data-target="groqKey1">👁️</button>
      </div>
      <div class="key-input">
        <input type="password" id="groqKey2" placeholder="Fallback Key 2">
        <button class="eye-toggle" data-target="groqKey2">👁️</button>
      </div>
      <div class="key-input">
        <input type="password" id="groqKey3" placeholder="Fallback Key 3">
        <button class="eye-toggle" data-target="groqKey3">👁️</button>
      </div>
    </div>

    <div class="section center">
      <button id="activateBtn" class="activate-btn">Activate Lens</button>
      <div id="currentStatus" class="status-msg">Waiting for activation...</div>
    </div>

    <div class="footer">
      Hold <b>Ctrl</b> to highlight | <b>Click</b> to capture
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
