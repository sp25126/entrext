<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#09090b] text-white w-[360px] p-5 font-sans overflow-hidden">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-xl font-black tracking-tighter">Entrext Lens</h1>
            <p class="text-[9px] font-bold text-cyan-400 tracking-widest uppercase opacity-60">AI Auditing Engine</p>
        </div>
        <div class="w-8 h-8 rounded-full bg-cyan-500/10 flex items-center justify-center border border-cyan-500/20">
            <div class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></div>
        </div>
    </div>

    <div id="status-container" class="space-y-4">
        <div class="p-4 rounded-xl bg-white/5 border border-white/10 text-center py-10">
            <p class="text-[10px] font-black uppercase tracking-widest text-white/20 mb-2">Awaiting Session</p>
            <p class="text-xs text-white/40">Shift + Click an element on any page to begin analysis.</p>
        </div>
    </div>

    <!-- Pipeline Template (Hidden) -->
    <template id="pipeline-template">
        <div class="space-y-5">
            <div class="pass-item" data-pass="1">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white/40">Pass 1: Classification</span>
                    <span class="status-indicator text-[8px] font-bold px-1.5 py-0.5 rounded bg-white/5 text-white/20">PENDING</span>
                </div>
                <div class="stream-box h-8 overflow-hidden rounded-lg bg-black/40 border border-white/5 p-2 text-[10px] font-mono text-cyan-400/60 italic"></div>
            </div>
            <div class="pass-item" data-pass="2">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white/40">Pass 2: Prompting</span>
                    <span class="status-indicator text-[8px] font-bold px-1.5 py-0.5 rounded bg-white/5 text-white/20">PENDING</span>
                </div>
                <div class="stream-box h-12 overflow-hidden rounded-lg bg-black/40 border border-white/5 p-2 text-[10px] font-mono text-white/40"></div>
            </div>
            <div class="pass-item" data-pass="3">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white/40">Pass 3: Code Gen</span>
                    <span class="status-indicator text-[8px] font-bold px-1.5 py-0.5 rounded bg-white/5 text-white/20">PENDING</span>
                </div>
                <div class="stream-box h-16 overflow-hidden rounded-lg bg-black/40 border border-white/5 p-2 text-[9px] font-mono text-white/60"></div>
            </div>
            <button id="download-report" class="hidden w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black uppercase tracking-widest py-3 rounded-lg text-xs transition-all shadow-xl">
                Download Technical Report
            </button>
        </div>
    </template>

    <script src="index.js" type="module"></script>
</body>
</html>
